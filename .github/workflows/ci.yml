name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate skill
        run: python3 scripts/quick_validate.py skills/design-style

  package:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package skill
        run: python3 scripts/package_skill.py . dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-zip
          path: dist/*.zip
